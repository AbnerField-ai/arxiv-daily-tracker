name: 每日论文追踪

on:
  schedule:
    # 每天北京时间凌晨 3:00 自动运行（UTC 19:00 前一天）
    # 选择凌晨是因为此时 arXiv 服务器负载低，抓取成功率高
    - cron: '0 19 * * *'
  workflow_dispatch:  # 允许手动触发（测试用）

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install pymupdf

      - name: 抓取论文 + AI 摘要 + 邮箱提取
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: 生成网页
        run: python scripts/generate_html.py

      - name: 提交数据和网页
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --quiet --cached || git commit -m "📄 更新论文日报 $(date +%Y-%m-%d)"
          git push

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
